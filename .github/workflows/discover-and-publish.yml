name: Discover and Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/**'
      - 'docs/discoveries/**'
  workflow_dispatch:
  schedule:
    - cron: '23 2 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run discovery
        run: npm run discover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit discovery data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/discoveries
          if git diff --cached --quiet; then
            echo "No discovery changes to commit"
          else
            git commit -m "data: update discovered projects"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html styles.css app.js _site/
          cp -R data _site/data
          cp -R docs _site/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
